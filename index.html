<!DOCTYPE html>
<html>

<head>
    <title>BFHL API Frontend</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        textarea {
            width: 300px;
            height: 100px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
        }

        pre {
            background: #000;
            color: #0f0;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h2>BFHL API Tester</h2>

    <p>Enter array (example):</p>

    <textarea id="input">["A->B","A->C","B->D"]</textarea><br>

    <button onclick="send()">Submit</button>

    <h3>Output:</h3>
    <pre id="output"></pre>

    <script>
        async function send() {
            try {
                let data = JSON.parse(document.getElementById("input").value);

                let res = await fetch("/bfhl", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ data })
                });

                let json = await res.json();

                document.getElementById("output").innerText =
                    JSON.stringify(json, null, 2);

            } catch (err) {
                document.getElementById("output").innerText = "Error: " + err.message;
            }
        }
    </script>

</body>

</html>
