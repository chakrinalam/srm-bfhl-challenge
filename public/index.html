<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFHL Challenge - Hierarchy Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .input-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .output-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            max-height: 80vh;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .example-buttons {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-example {
            background: #f0f0f0;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .btn-example:hover {
            background: #e0e0e0;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            margin-top: 15px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #fee;
            border-left: 4px solid #f44336;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            color: #c62828;
        }

        .tree-node {
            margin-left: 20px;
            position: relative;
        }

        .tree-node::before {
            content: '📁';
            margin-right: 8px;
        }

        .tree-leaf {
            margin-left: 20px;
            position: relative;
        }

        .tree-leaf::before {
            content: '📄';
            margin-right: 8px;
        }

        .hierarchy-card {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .hierarchy-root {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }

        .badge-cycle {
            background: #ff5722;
            color: white;
        }

        .badge-depth {
            background: #4caf50;
            color: white;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .json-viewer {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🏗️ BFHL Hierarchy Builder</h1>
            <p>Build and visualize hierarchical relationships from node connections</p>
        </div>

        <div class="main-content">
            <div class="input-section">
                <h2 class="section-title">📝 Input Data</h2>
                <textarea id="inputData" rows="10" placeholder='Enter nodes in format: X->Y
Example:
A->B
A->C
B->D
C->E
X->Y
Y->Z
Z->X
P->Q
G->H
G->H
hello
1->2
A->'></textarea>

                <div class="example-buttons">
                    <button class="btn-example" onclick="loadExample(1)">Example 1</button>
                    <button class="btn-example" onclick="loadExample(2)">Example 2 (With Cycle)</button>
                    <button class="btn-example" onclick="clearInput()">Clear</button>
                </div>

                <button class="btn-submit" onclick="submitData()">🚀 Process Data</button>
            </div>

            <div class="output-section">
                <h2 class="section-title">📊 Results</h2>
                <div id="output"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://your-backend-url.onrender.com/bfhl'; // REPLACE WITH YOUR ACTUAL API URL

        function loadExample(num) {
            const examples = {
                1: `A->B
A->C
B->D
C->E
E->F
X->Y
Y->Z
Z->X
P->Q
Q->R
G->H
G->H
G->I
hello
1->2
A->`,
                2: `A->B
B->C
C->A
X->Y
Y->Z
Z->Y`
            };
            document.getElementById('inputData').value = examples[num] || examples[1];
        }

        function clearInput() {
            document.getElementById('inputData').value = '';
        }

        function renderTree(treeObj, indent = 0) {
            if (!treeObj || Object.keys(treeObj).length === 0) return '';

            let html = '<div style="margin-left: 20px;">';
            for (const [key, value] of Object.entries(treeObj)) {
                html += `<div class="tree-node">${key}`;
                if (value && Object.keys(value).length > 0) {
                    html += renderTree(value, indent + 1);
                } else {
                    html += '<div style="margin-left: 20px; color: #888;">(leaf)</div>';
                }
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function displayResponse(data) {
            const outputDiv = document.getElementById('output');

            let html = `
                <div class="summary-stats">
                    <div class="stat-card">
                        <div class="stat-value">${data.summary.total_trees}</div>
                        <div class="stat-label">Valid Trees</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.summary.total_cycles}</div>
                        <div class="stat-label">Cycles Detected</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.summary.largest_tree_root || 'N/A'}</div>
                        <div class="stat-label">Largest Tree</div>
                    </div>
                </div>
            `;

            if (data.invalid_entries && data.invalid_entries.length > 0) {
                html += `<div class="error">
                    <strong>⚠️ Invalid Entries:</strong> ${data.invalid_entries.join(', ')}
                </div>`;
            }

            if (data.duplicate_edges && data.duplicate_edges.length > 0) {
                html += `<div class="error" style="background: #ffe; border-left-color: #ff9800;">
                    <strong>🔄 Duplicate Edges:</strong> ${data.duplicate_edges.join(', ')}
                </div>`;
            }

            html += '<h3 style="margin: 20px 0 10px 0;">🏗️ Hierarchies</h3>';

            for (let i = 0; i < data.hierarchies.length; i++) {
                const h = data.hierarchies[i];
                html += `<div class="hierarchy-card">
                    <div class="hierarchy-root">
                        Root: ${h.root}
                        ${h.has_cycle ? '<span class="badge badge-cycle">⚠️ Cycle Detected</span>' : ''}
                        ${h.depth ? `<span class="badge badge-depth">Depth: ${h.depth}</span>` : ''}
                    </div>`;

                if (h.has_cycle) {
                    html += `<div style="color: #ff5722; padding: 10px;">
                        🔄 Cycle detected in this group
                    </div>`;
                } else if (h.tree && Object.keys(h.tree).length > 0) {
                    html += renderTree(h.tree);
                }

                html += '</div>';
            }

            html += '<h3 style="margin: 20px 0 10px 0;">📄 Raw JSON Response</h3>';
            html += `<div class="json-viewer">${JSON.stringify(data, null, 2)}</div>`;

            outputDiv.innerHTML = html;
        }

        async function submitData() {
            const inputText = document.getElementById('inputData').value;
            const lines = inputText.split('\n').filter(line => line.trim().length > 0);

            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Processing...</p></div>';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ data: lines })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                displayResponse(data);

            } catch (error) {
                outputDiv.innerHTML = `<div class="error">
                    <strong>❌ Error:</strong> ${error.message}<br>
                    Please check if the API is running and CORS is enabled.
                </div>`;
            }
        }
    </script>
</body>

</html>
